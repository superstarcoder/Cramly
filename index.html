<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Study Guide</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800&family=JetBrains+Mono:wght@400;500&display=swap" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --fg: #1f2328;
      --muted: #57606a;
      --bg: #f7f5f0;
      --card-bg: #ffffff;
      --border: #e3dfd5;
      --rule: #ece8de;
      --code-bg: #f4f1ea;
      --accent: #6f42c1;
      --accent-soft: #efe7fb;
      --key: #0969da;
      --warn: #d73a49;
      --tip: #1a7f37;
      --heading: #6f42c1;
      --subheading: #0550ae;
      --label-bg: #ece8de;
      --label-fg: #57606a;
      --shadow: 0 1px 2px rgba(27, 31, 35, .04), 0 8px 24px rgba(27, 31, 35, .06);
      --grad: linear-gradient(135deg, #6f42c1 0%, #0969da 100%);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #e6edf3;
        --muted: #8b949e;
        --bg: #0b0f17;
        --card-bg: #11161f;
        --border: #232b38;
        --rule: #1c2330;
        --code-bg: #161b26;
        --accent: #d2a8ff;
        --accent-soft: #1d1730;
        --key: #79c0ff;
        --warn: #ff7b72;
        --tip: #3fb950;
        --heading: #d2a8ff;
        --subheading: #79c0ff;
        --label-bg: #1c2330;
        --label-fg: #c9d1d9;
        --shadow: 0 1px 2px rgba(0, 0, 0, .4), 0 12px 30px rgba(0, 0, 0, .35);
        --grad: linear-gradient(135deg, #d2a8ff 0%, #79c0ff 100%);
      }
    }
    * { box-sizing: border-box; }
    html, body { background: var(--bg); color: var(--fg); }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.65;
      margin: 0;
      padding: 3rem 1.25rem 6rem;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--grad);
      z-index: 10;
    }
    #content {
      max-width: 820px;
      margin: 0 auto;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 3rem 3.25rem 3.5rem;
      animation: fadeIn 0.35s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 640px) {
      #content { padding: 2rem 1.5rem; border-radius: 10px; }
      body { padding: 2rem 0.75rem 4rem; }
    }

    h1, h2, h3, h4 {
      font-family: "Fraunces", Georgia, "Times New Roman", serif;
      line-height: 1.2;
      letter-spacing: -0.01em;
    }
    h1 {
      font-size: 2.4rem;
      font-weight: 800;
      margin: 0 0 1.5rem;
      padding-bottom: 0.75rem;
      background: var(--grad);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      border-bottom: 2px solid var(--rule);
    }
    h2 {
      font-size: 1.55rem;
      font-weight: 700;
      margin: 2.5rem 0 1rem;
      padding-left: 0.75rem;
      border-left: 4px solid var(--accent);
      position: relative;
    }
    h3 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
      margin: 1.75rem 0 0.6rem;
    }
    h4 {
      font-size: 1.02rem;
      font-weight: 600;
      margin: 1.25rem 0 0.4rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    p { margin: 0.6rem 0 1rem; }
    a { color: var(--accent); text-decoration: none; border-bottom: 1px dashed var(--accent); }
    a:hover { border-bottom-style: solid; }

    strong { color: var(--fg); font-weight: 600; }
    em { color: var(--muted); }

    ul, ol { padding-left: 1.4rem; margin: 0.6rem 0 1rem; }
    li { margin: 0.3rem 0; }
    li::marker { color: var(--accent); }

    hr {
      border: none;
      height: 1px;
      background: var(--rule);
      margin: 2rem 0;
    }

    code {
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: var(--code-bg);
      padding: .15em .4em;
      border-radius: 5px;
      font-size: 0.88em;
      border: 1px solid var(--rule);
    }
    pre {
      background: var(--code-bg);
      padding: 1rem 1.15rem;
      border-radius: 10px;
      overflow-x: auto;
      border: 1px solid var(--rule);
      line-height: 1.55;
    }
    pre code { background: transparent; padding: 0; border: none; font-size: 0.88em; }

    table {
      border-collapse: separate;
      border-spacing: 0;
      margin: 1.2rem 0;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      font-size: 0.95em;
    }
    th, td { padding: .65em .9em; text-align: left; border-bottom: 1px solid var(--rule); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:nth-child(even) { background: var(--code-bg); }
    th {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 600;
      font-size: 0.82em;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
    }

    blockquote {
      color: var(--muted);
      border-left: 4px solid var(--accent);
      background: var(--accent-soft);
      margin: 1.2rem 0;
      padding: 0.6rem 1.1rem;
      border-radius: 0 8px 8px 0;
      font-style: italic;
    }
    blockquote p:last-child { margin-bottom: 0; }
    blockquote p:first-child { margin-top: 0; }

    .katex-display {
      padding: 0.6rem 0.8rem;
      margin: 1rem 0;
      background: var(--code-bg);
      border-radius: 8px;
      border: 1px solid var(--rule);
      overflow-x: auto;
    }
    .katex { font-size: 1.05em; }

    .key  { color: var(--key); font-weight: 600; }
    .warn { color: var(--warn); font-weight: 500; }
    .tip  { color: var(--tip); font-weight: 500; }
    .heading {
      color: var(--heading);
      font-family: "Fraunces", Georgia, serif;
      font-weight: 700;
      font-size: 1.08em;
    }
    .subheading { color: var(--subheading); font-weight: 600; }
    .label {
      display: inline-block;
      background: var(--label-bg);
      color: var(--label-fg);
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 0.72em;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.18em 0.55em;
      border-radius: 5px;
      vertical-align: middle;
      border: 1px solid var(--rule);
    }

    #error {
      color: #b62324;
      background: #ffebe9;
      border: 1px solid #ff8182;
      padding: 1em 1.2em;
      border-radius: 10px;
      font-family: "Inter", sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      #error { background: #2a1416; color: #ff9d99; border-color: #6e2329; }
    }
  </style>
</head>
<body>
  <div id="content">Loading notes/outputs/study_guide.md…</div>

  <script>
    marked.setOptions({ gfm: true, breaks: false });

    // Protect math spans from Markdown parsing so KaTeX sees them intact.
    const mathBlock = {
      name: "mathBlock",
      level: "block",
      start(src) { return src.indexOf("$$"); },
      tokenizer(src) {
        const match = /^\$\$([\s\S]+?)\$\$/.exec(src);
        if (match) return { type: "mathBlock", raw: match[0], text: match[1] };
      },
      renderer(token) { return `$$${token.text}$$`; },
    };
    const mathInline = {
      name: "mathInline",
      level: "inline",
      start(src) { return src.indexOf("$"); },
      tokenizer(src) {
        const match = /^\$(?!\s)([^\$\n]+?)(?<!\s)\$/.exec(src);
        if (match) return { type: "mathInline", raw: match[0], text: match[1] };
      },
      renderer(token) { return `$${token.text}$`; },
    };
    marked.use({ extensions: [mathBlock, mathInline] });

    fetch("notes/outputs/study_guide.md")
      .then((res) => {
        if (!res.ok) throw new Error(`Could not load notes/outputs/study_guide.md (HTTP ${res.status})`);
        return res.text();
      })
      .then((md) => {
        document.getElementById("content").innerHTML = marked.parse(md);
        if (window.renderMathInElement) {
          renderMathInElement(document.getElementById("content"), {
            delimiters: [
              { left: "$$", right: "$$", display: true },
              { left: "$", right: "$", display: false },
              { left: "\\(", right: "\\)", display: false },
              { left: "\\[", right: "\\]", display: true },
            ],
            throwOnError: false,
          });
        } else {
          window.addEventListener("load", () => {
            renderMathInElement(document.getElementById("content"), {
              delimiters: [
                { left: "$$", right: "$$", display: true },
                { left: "$", right: "$", display: false },
                { left: "\\(", right: "\\)", display: false },
                { left: "\\[", right: "\\]", display: true },
              ],
              throwOnError: false,
            });
          });
        }
      })
      .catch((err) => {
        document.getElementById("content").innerHTML =
          `<div id="error"><strong>Failed to load notes/outputs/study_guide.md</strong><br>${err.message}<br><br>` +
          `Most browsers block <code>fetch()</code> of local files when opening <code>index.html</code> directly via <code>file://</code>. ` +
          `Run a local server from the project root:<br><pre>python3 -m http.server 8000</pre>` +
          `then open <a href="http://localhost:8000">http://localhost:8000</a>.</div>`;
      });
  </script>
</body>
</html>
